<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR MVP Scanner</title>
  <style>
    body { margin: 0; font-family: system-ui, Arial, sans-serif; background: #111; color: #fff; }
    .top { padding: 12px; background: #1b1b1b; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    button { padding: 10px 14px; border: 0; border-radius: 10px; font-weight: 700; cursor: pointer; }
    .start { background: #00d27a; color: #001b10; }
    .stop { background: #ff5a5a; color: #2a0000; }
    .msg { font-size: 13px; opacity: 0.9; }
    #arMount { position: fixed; inset: 52px 0 0 0; background: #000; }
    .markers { padding: 12px; display: flex; gap: 8px; flex-wrap: wrap; background: #171717; }
    .markers img { width: 84px; height: 84px; object-fit: contain; background: #fff; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="top">
    <button id="startBtn" class="start">Start scan</button>
    <button id="stopBtn" class="stop">Stop scan</button>
    <div id="status" class="msg">Нажмите Start scan</div>
  </div>

  <div class="markers">
    <img src="assets/markers/marker_0.png" alt="marker 0">
    <img src="assets/markers/marker_1.png" alt="marker 1">
    <img src="assets/markers/marker_2.png" alt="marker 2">
    <img src="assets/markers/marker_3.png" alt="marker 3">
    <img src="assets/markers/marker_4.png" alt="marker 4">
  </div>

  <div id="arMount"></div>

  <script>
    const statusEl = document.getElementById("status");
    const arMount = document.getElementById("arMount");
    let running = false;

    function setStatus(text){ statusEl.textContent = text; }

    async function loadScript(src){
      if (document.querySelector(`script[data-src="${src}"]`)) return;
      await new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src;
        s.async = true;
        s.dataset.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    function stopScan(){
      running = false;
      arMount.innerHTML = "";
      setStatus("Сканирование остановлено");
    }

    async function startScan(){
      try{
        const secure = location.protocol === "https:" || location.hostname === "localhost" || location.hostname === "127.0.0.1";
        if(!secure){
          setStatus("Нужен HTTPS для камеры");
          return;
        }
        if(!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)){
          setStatus("Браузер не поддерживает камеру");
          return;
        }

        setStatus("Запрашиваю камеру...");
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
        stream.getTracks().forEach(t => t.stop());

        await loadScript("https://aframe.io/releases/1.4.2/aframe.min.js");
        await loadScript("https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js");

        arMount.innerHTML = `
          <a-scene
            embedded
            vr-mode-ui="enabled: false"
            renderer="antialias: true; alpha: true"
            arjs="sourceType: webcam; facingMode: environment; debugUIEnabled: false; trackingMethod: best; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
          >
            <a-marker type="barcode" value="0">
              <a-box position="0 0.5 0" material="color: #00e5ff; opacity: 0.7"></a-box>
            </a-marker>
            <a-marker type="barcode" value="1">
              <a-box position="0 0.5 0" material="color: #00e5ff; opacity: 0.7"></a-box>
            </a-marker>
            <a-marker type="barcode" value="2">
              <a-box position="0 0.5 0" material="color: #00e5ff; opacity: 0.7"></a-box>
            </a-marker>
            <a-marker type="barcode" value="3">
              <a-box position="0 0.5 0" material="color: #00e5ff; opacity: 0.7"></a-box>
            </a-marker>
            <a-marker type="barcode" value="4">
              <a-box position="0 0.5 0" material="color: #00e5ff; opacity: 0.7"></a-box>
            </a-marker>
            <a-entity camera></a-entity>
          </a-scene>
        `;

        running = true;
        setStatus("Камера включена. Наведите на marker 0-4");
      }catch(e){
        setStatus("Ошибка запуска камеры/AR");
      }
    }

    document.getElementById("startBtn").addEventListener("click", () => {
      if(!running) startScan();
    });
    document.getElementById("stopBtn").addEventListener("click", stopScan);
  </script>
</body>
</html>
